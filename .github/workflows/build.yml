name: Build Graphite AppImage

# Compila la versión más reciente de Graphite (rama latest-stable) en Ubuntu y
# la empaqueta como un AppImage portable x86_64. Sin xbps, sin Void Linux.
#
# Disparadores:
#   - workflow_dispatch : ejecución manual (opcionalmente con un commit)
#   - schedule          : cada lunes a las 06:00 UTC
#   - push a main       : cuando cambian el script de build o este workflow
#                         (sólo compila y sube artifact; NO crea release)

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit de Graphite (vacío = latest latest-stable)'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    paths:
      - 'ci/build-appimage.sh'
      - '.github/workflows/build.yml'

permissions:
  contents: write   # necesario para crear releases (softprops/action-gh-release)

env:
  CEF_VERSION: '149.0.5+g6770623+chromium-149.0.7827.197'
  BINARYEN_VERSION: '130'
  RUST_VERSION: '1.96.0'
  WASM_BINDGEN_VERSION: '0.2.121'

jobs:
  build:
    # 22.04 da un glibc más viejo (2.35) → el AppImage corre en más distros.
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    outputs:
      version: ${{ steps.meta.outputs.version }}
      commit:  ${{ steps.meta.outputs.commit }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Graphite commit
        id: meta
        run: |
          COMMIT="${{ github.event.inputs.commit }}"
          if [ -z "$COMMIT" ]; then
            COMMIT=$(git ls-remote https://github.com/GraphiteEditor/Graphite.git latest-stable | awk '{print $1}')
          fi
          SHORT=$(printf '%s' "$COMMIT" | cut -c1-7)
          echo "commit=$COMMIT"           >> "$GITHUB_OUTPUT"
          echo "version=0.0.0git${SHORT}"  >> "$GITHUB_OUTPUT"
          echo "Resolved commit: $COMMIT"

      # Cachea el toolchain de Rust y el registry/target de cargo entre runs.
      - name: Cache Rust & cargo
        uses: actions/cache@v4
        with:
          path: |
            /tmp/graphite-build/rustup
            /tmp/graphite-build/cargo
            /tmp/graphite-build/src/target
          key: appimage-rust-${{ env.RUST_VERSION }}-${{ hashFiles('ci/build-appimage.sh') }}
          restore-keys: |
            appimage-rust-${{ env.RUST_VERSION }}-

      - name: Build AppImage
        env:
          GRAPHITE_COMMIT: ${{ steps.meta.outputs.commit }}
          VERSION:         ${{ steps.meta.outputs.version }}
          ARTIFACTS:       ${{ github.workspace }}/artifacts
        run: sh ci/build-appimage.sh

      - name: Show artifact
        run: |
          ls -lh artifacts/
          cat artifacts/*.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: graphite-appimage
          path: artifacts/
          if-no-files-found: error

  # El release sólo se crea en ejecuciones manuales o programadas (no en push).
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: graphite-appimage
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Graphite ${{ needs.build.outputs.version }} (AppImage x86_64)
          body: |
            Build automático de Graphite `latest-stable`
            (commit `${{ needs.build.outputs.commit }}`).

            AppImage portable con Chromium Embedded Framework (CEF) 149.
            Corre en cualquier distribución Linux x86_64 — sin instalación ni root.

            **Ejecución**
            ```
            chmod +x Graphite-*-x86_64.AppImage
            ./Graphite-*-x86_64.AppImage
            ```
          files: |
            artifacts/*.AppImage
            artifacts/*.sha256
          prerelease: true
          make_latest: false
