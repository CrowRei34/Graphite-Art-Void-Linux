name: Build Graphite XBPS

# Compila automáticamente la versión más reciente de Graphite (rama
# latest-stable) y la empaqueta como .xbps para Void Linux x86_64.
#
# Disparadores:
#   - workflow_dispatch : ejecución manual (opcionalmente con un commit)
#   - schedule          : cada lunes a las 06:00 UTC
#   - push a main       : cuando cambian el script de build o este workflow
#                         (sólo compila y sube artifact; NO crea release)

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit de Graphite (vacío = latest latest-stable)'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    paths:
      - 'ci/build.sh'
      - '.github/workflows/build.yml'

permissions:
  contents: write   # necesario para crear releases (softprops/action-gh-release)

# Versiones de los componentes prebuilt (CEF, binaryen, toolchain, etc.).
# Sólo el commit de Graphite cambia entre builds; el resto queda pinned.
env:
  CEF_VERSION: '149.0.5+g6770623+chromium-149.0.7827.197'
  BINARYEN_VERSION: '130'
  RUST_VERSION: '1.96.0'
  WASM_BINDGEN_VERSION: '0.2.121'
  BRANDING_COMMIT: '0d004aa61e6b48d316e8e5db6d59ccc4788f192d'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      version:  ${{ steps.meta.outputs.version }}
      filename: ${{ steps.meta.outputs.filename }}
      commit:   ${{ steps.meta.outputs.commit }}
    steps:
      - uses: actions/checkout@v4

      # Resuelve qué commit de Graphite compilar.
      # Se hace en el host (ubuntu) porque ahí actions/checkout ya está y git
      # está disponible; luego el commit se pasa al contenedor Void.
      - name: Resolve Graphite commit
        id: meta
        run: |
          COMMIT="${{ github.event.inputs.commit }}"
          if [ -z "$COMMIT" ]; then
            COMMIT=$(git ls-remote https://github.com/GraphiteEditor/Graphite.git latest-stable | awk '{print $1}')
          fi
          SHORT=$(printf '%s' "$COMMIT" | cut -c1-7)
          VERSION="0.0.0git${SHORT}"
          echo "commit=$COMMIT"    >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "filename=graphite-${VERSION}_1.x86_64.xbps" >> "$GITHUB_OUTPUT"
          echo "Resolved commit: $COMMIT (version $VERSION)"

      # Caché del toolchain de Rust y del registry de cargo. Persiste entre
      # runs para no re-descargar/recompilar rustup + wasm-bindgen-cli.
      - name: Cache Rust toolchain & cargo
        uses: actions/cache@v4
        with:
          path: |
            /tmp/rustup-cache
            /tmp/cargo-cache
          key: rust-${{ env.RUST_VERSION }}-wb-${{ env.WASM_BINDGEN_VERSION }}-${{ hashFiles('ci/build.sh') }}
          restore-keys: |
            rust-${{ env.RUST_VERSION }}-wb-${{ env.WASM_BINDGEN_VERSION }}-

      # El build corre dentro de un contenedor Void Linux (glibc full).
      # Se monta el checkout en /work y las cachés de Rust en /var/cache.
      # Así las JS-actions (checkout/cache/upload) corren en el host ubuntu
      # sin problemas de compatibilidad dentro del contenedor.
      - name: Build in Void Linux container
        env:
          GRAPHITE_COMMIT: ${{ steps.meta.outputs.commit }}
          VERSION:         ${{ steps.meta.outputs.version }}
        run: |
          mkdir -p /tmp/rustup-cache /tmp/cargo-cache artifacts
          docker run --rm \
            -v "$PWD:/work" \
            -v "/tmp/rustup-cache:/var/cache/graphite-rustup" \
            -v "/tmp/cargo-cache:/var/cache/graphite-cargo" \
            -e GRAPHITE_COMMIT -e VERSION \
            -e CEF_VERSION -e BINARYEN_VERSION -e RUST_VERSION \
            -e WASM_BINDGEN_VERSION -e BRANDING_COMMIT \
            -e ARTIFACTS=/work/artifacts \
            -e CARGO_BUILD_JOBS=3 \
            --workdir /work \
            ghcr.io/void-linux/void-glibc-full:latest \
            sh ci/build.sh

      - name: Show artifact
        run: |
          ls -lh artifacts/
          cat artifacts/*.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: graphite-xbps
          path: artifacts/
          if-no-files-found: error

  # El release sólo se crea en ejecuciones manuales o programadas (no en push).
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: graphite-xbps
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Graphite ${{ needs.build.outputs.version }} (Void Linux x86_64)
          body: |
            Build automático de Graphite `latest-stable`
            (commit `${{ needs.build.outputs.commit }}`).

            Empaquetado para Void Linux x86_64 con Chromium Embedded Framework (CEF) 149.

            **Instalación**
            ```
            xbps-install -R <directorio-con-el-.xbps> graphite
            ```
            Consulta INSTALL.md en el repositorio para más detalles.
          files: |
            artifacts/*.xbps
            artifacts/*.sha256
          prerelease: true
          make_latest: false
